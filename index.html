<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyOnlyProfit</title>

<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
    --pink:#FF2D7B;
    --purple:#9D4EDD;
    --cyan:#00F5FF;
    --dark:#0A0A0B;
    --dark2:#111113;
    --dark3:#1A1A1D;
    --text:#E0E0E0;
}

body{
    font-family:'Chakra Petch',sans-serif;
    background:var(--dark);
    color:var(--text);
    overflow:hidden;
}

/* NAV (UNCHANGED STYLE) */
.nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
    padding:16px 40px;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    background:rgba(10,10,11,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--dark3);
}

.nav-links{
    display:flex;
    gap:28px;
    list-style:none;
}

.nav-cta-cyan{
    background:var(--cyan);
    color:var(--dark);
    padding:8px 18px;
    font-family:'Space Mono',monospace;
    font-size:.7rem;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    text-decoration:none;
    clip-path:polygon(0 0,100% 0,100% 70%,90% 100%,0 100%);
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:120px 40px 80px;
    position:relative;
}

.hero video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

/* overlay */
.hero::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(rgba(10,10,11,0.75),rgba(10,10,11,0.9));
    z-index:1;
}

.hero h1,
.hero p{
    position:relative;
    z-index:2;
}

.hero h1{
    font-family:'Space Mono',monospace;
    font-size:4rem;
    text-transform:uppercase;
    letter-spacing:-2px;
    margin-bottom:20px;
}

.hero p{
    font-size:1rem;
    color:#aaa;
}
</style>

</head>

<body>

<nav class="nav">
    <ul class="nav-links">
        <li>
            <a href="https://project-ke2z2.vercel.app" class="nav-cta-cyan">
                ENTER_SYSTEM
            </a>
        </li>
    </ul>
</nav>

<section class="hero">
    <video autoplay muted loop playsinline>
        <source src="video/background.mp4" type="video/mp4">
    </video>

    <h1>Under Construction</h1>
    <h2>We'll be back shortly<h2>
    <p>Contact system@myonlyprofit.com</p>
</section>

</body>
</html>
